<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TATUNG SMART HOME - Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Prompt', sans-serif; user-select: none; }
        body { background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; }
        
        .screen-canvas { 
            width: 1200px; height: 1920px; position: relative; 
            background-size: cover; background-position: center; perspective: 2000px; 
        }
        
        header { 
            position: absolute; top: 0; left: 0; width: 100%; display: flex; 
            justify-content: space-between; align-items: flex-start; 
            padding: 80px 100px; color: #fff; z-index: 10; 
        }
        .brand-name, .time { font-size: 40px; font-weight: 600; letter-spacing: 6px; text-transform: uppercase; color: #ffffff; }
        .project-name, .date { font-size: 25px; font-weight: 300; letter-spacing: 1px; color: #ffffff; }

        /* Data Boxes */
        .data-box { 
            position: absolute; width: 280px; height: 180px; background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 40px; z-index: 5; color: #ffffff; display: flex; 
            flex-direction: column; justify-content: center; padding: 20px; transition: 0.3s; 
        }
        .solar-box { top: 370px; left: 50%; transform: translateX(-50%); } 
        .pea-box   { top: 560px; left: 87%; transform: translateX(-50%);}
        .mg-box    { top: 1080px; left: 85%; transform: translateX(-50%);}
        .home-box  { top: 840px; left: 33%; transform: rotateY(-25deg) rotateX(2deg); box-shadow: -20px 20px 50px rgba(0,0,0,0.5); }

        .data-box .title { font-size: 22px; font-weight: 600; color: #ffffff; text-transform: uppercase; text-align: center; margin-bottom: 12px; letter-spacing: 2px; }
        .data-row { display: flex; justify-content: center; align-items: baseline; margin-bottom: 2px; gap: 10px; width: 100%; }
        .data-box .value { font-size: 32px; font-weight: 600; color: #ffffff; text-align: right; }
        .data-box .unit { font-size: 20px; color: #ffffff; width: 45px; text-align: left; opacity: 0.8; }

        /* Floating Bulb Button */
        .floating-bulb {
            position: absolute; bottom: 80px; right: 80px; width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 100; transition: 0.3s; color: #fff; font-size: 50px;
        }
        .floating-bulb.active { background: #ffcc00; color: #000; box-shadow: 0 0 50px #ffcc00; border-color: #fff; }

        /* Light Panel */
        .light-panel {
            position: absolute; bottom: 220px; right: 80px; width: 480px;
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(50px);
            border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px; z-index: 90; display: none; flex-direction: column; gap: 15px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
        }
        .light-panel.show { display: flex; animation: fadeUp 0.3s ease-out; }

        .switch-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 18px 25px; background: rgba(255,255,255,0.05); border-radius: 25px;
        }
        .switch-name { color: #fff; font-size: 24px; font-weight: 300; }
        
        .btn-toggle {
            width: 90px; height: 45px; background: #444; border-radius: 25px;
            position: relative; cursor: pointer; transition: 0.4s;
        }
        .btn-toggle::after {
            content: ''; position: absolute; top: 4px; left: 4px; width: 37px; height: 37px;
            background: #fff; border-radius: 50%; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-toggle.on { background: #34c759; }
        .btn-toggle.on::after { left: 49px; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .update-tag { position: absolute; bottom: 40px; left: 100px; color: rgba(255,255,255,0.4); font-size: 18px; }
    </style>
</head>
<body>

    <div class="screen-canvas" id="canvas">
        <header>
            <div class="brand-container">
                <div class="brand-name">Tatung Smart Home</div>
                <div class="project-name">PLENO TOWN Rangsit Klong4</div>
            </div>
            <div class="time-container">
                <div class="time" id="clock">00:00:00</div>
                <div class="date" id="date">...</div>
            </div>
        </header>

        <div class="data-box solar-box"><div class="title">Solar Power</div><div class="data-row"><span class="value" id="solar-kw">0.00</span><span class="unit">kW</span></div><div class="data-row"><span class="value" id="solar-amp">0.00</span><span class="unit">A</span></div></div>
        <div class="data-box pea-box"><div class="title">Grid PEA</div><div class="data-row"><span class="value" id="pea-kw">0.00</span><span class="unit">kW</span></div><div class="data-row"><span class="value" id="pea-amp">0.00</span><span class="unit">A</span></div></div>
        <div class="data-box home-box"><div class="title">Home Load</div><div class="data-row"><span class="value" id="home-kw">0.00</span><span class="unit">kW</span></div><div class="data-row"><span class="value" id="home-amp">0.00</span><span class="unit">A</span></div></div>
        <div class="data-box mg-box"><div class="title">MG4 Charger</div><div class="data-row"><span class="value" id="mg-kw">0.00</span><span class="unit">kW</span></div><div class="data-row"><span class="value" id="mg-amp">0.00</span><span class="unit">A</span></div></div>

        <div class="floating-bulb" id="bulb-trigger" onclick="togglePanel()">
            <i class="fas fa-lightbulb"></i>
        </div>

        <div class="light-panel" id="light-panel">
            <h2 style="color:#fff; text-align:center; font-weight:400; margin-bottom:15px; letter-spacing:2px;">LIGHTS</h2>
            <div class="switch-row"><span class="switch-name">Living Room</span><div class="btn-toggle" id="sw-Room1" onclick="controlLight('Room1')"></div></div>
            <div class="switch-row"><span class="switch-name">Garage</span><div class="btn-toggle" id="sw-Room2" onclick="controlLight('Room2')"></div></div>
            <div class="switch-row"><span class="switch-name">Kitchen</span><div class="btn-toggle" id="sw-Room3" onclick="controlLight('Room3')"></div></div>
            <div class="switch-row"><span class="switch-name">Bedroom</span><div class="btn-toggle" id="sw-Room4" onclick="controlLight('Room4')"></div></div>
            <div class="switch-row"><span class="switch-name">Stairway</span><div class="btn-toggle" id="sw-Room5" onclick="controlLight('Room5')"></div></div>
            <div class="switch-row"><span class="switch-name">Fence</span><div class="btn-toggle" id="sw-Room6" onclick="controlLight('Room6')"></div></div>
        </div>

        <div class="update-tag">Smart Home Online <span id="last-update"></span></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://my-tung-s-place-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function togglePanel() {
            const panel = document.getElementById('light-panel');
            const bulb = document.getElementById('bulb-trigger');
            panel.classList.toggle('show');
            bulb.classList.toggle('active');
        }

        function listenData() {
            // ดึงค่าพลังงานจาก Firebase มาโชว์อย่างเดียว
            database.ref('/live_power').on('value', (s) => {
                const d = s.val();
                if(d) {
                    document.getElementById('solar-kw').innerText = d.solar.kw.toFixed(2);
                    document.getElementById('solar-amp').innerText = d.solar.amp.toFixed(2);
                    document.getElementById('home-kw').innerText = d.home.kw.toFixed(2);
                    document.getElementById('home-amp').innerText = d.home.amp.toFixed(2);
                    document.getElementById('mg-kw').innerText = d.mg.kw.toFixed(2);
                    document.getElementById('mg-amp').innerText = (d.mg.amp || 0).toFixed(2);
                    document.getElementById('pea-kw').innerText = d.pea.kw.toFixed(2);
                    document.getElementById('pea-amp').innerText = d.pea.amp.toFixed(2);
                    document.getElementById('last-update').innerText = " | Sync: " + (d.lastUpdate || "");
                }
            });

            // ดึงค่าสถานะไฟมาโชว์ที่ปุ่ม
            database.ref('/smart_home/lights').on('value', (s) => {
                const l = s.val();
                if(l) {
                    for(let i=1; i<=6; i++) {
                        const roomKey = 'Room' + i;
                        const el = document.getElementById('sw-' + roomKey);
                        if(el) l[roomKey] ? el.classList.add('on') : el.classList.remove('on');
                    }
                }
            });
        }

        function controlLight(roomKey) {
            const ref = database.ref(`/smart_home/lights/${roomKey}`);
            ref.once('value').then(s => ref.set(!s.val()));
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('th-TH', {hour12:false});
            document.getElementById('date').innerText = now.toLocaleDateString('th-TH', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
            const h = now.getHours();
            const bg = (h >= 18 || h < 6) ? "https://images.weserv.nl/?url=drive.google.com/uc?id=1LoXsjr1WRChv_wdaV-1WRYegaeDnTuN-" : "https://images.weserv.nl/?url=drive.google.com/uc?id=15PyIhFp6S9lx-O1HEn1dlda1s2M3I3R6";
            document.getElementById('canvas').style.backgroundImage = `url('${bg}')`;
        }

        const autoScale = () => { document.getElementById('canvas').style.zoom = Math.min(window.innerWidth / 1200, window.innerHeight / 1920); };
        window.onresize = autoScale;
        autoScale();
        setInterval(updateClock, 1000);
        updateClock();
        listenData();
    </script>
</body>
</html>
